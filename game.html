<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUS QUIZZZZ</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --void: #04060f;
      --surface: rgba(12, 20, 40, 0.88);
      --border: rgba(100, 180, 255, 0.12);
      --cyan: #38d9f5;
      --amber: #f5a623;
      --red: #f55;
      --green: #3df5a0;
      --text: #ccd9f0;
      --muted: #5a7099;
      --glow-cyan: 0 0 20px rgba(56,217,245,0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--void);
      font-family: 'Syne', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(1px 1px at 8%  15%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 55%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 10%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 90%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 92% 40%, rgba(56,217,245,0.5) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 3%  65%, rgba(56,217,245,0.4) 0%, transparent 100%);
      pointer-events: none; z-index: 0;
    }

    .wrap {
      position: relative; z-index: 1;
      width: 560px;
      animation: rise 0.5s ease both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* HUD top bar */
    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding: 0 4px;
    }

    .hud-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 8px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      backdrop-filter: blur(12px);
    }

    .hud-pill .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 6px var(--cyan);
      animation: pulse 1.5s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .score-val { color: var(--cyan); font-weight: 600; }
    .timer-val { color: var(--amber); font-weight: 600; }
    .timer-val.urgent { color: var(--red); animation: blink 0.5s ease infinite; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .diff-badge {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      letter-spacing: 0.1em;
      padding: 4px 10px;
      border-radius: 99px;
      text-transform: uppercase;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .diff-badge.easy   { color: var(--green); border-color: rgba(61,245,160,0.3); }
    .diff-badge.medium { color: var(--amber); border-color: rgba(245,166,35,0.3); }
    .diff-badge.hard   { color: var(--red);   border-color: rgba(255,85,85,0.3);  }

    /* Progress bar */
    .progress-wrap {
      background: rgba(255,255,255,0.05);
      border-radius: 99px;
      height: 4px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), #6060ff);
      border-radius: 99px;
      transition: width 0.4s ease;
      box-shadow: 0 0 10px rgba(56,217,245,0.5);
    }

    /* Timer bar */
    .timer-bar-wrap {
      background: rgba(255,255,255,0.05);
      border-radius: 99px;
      height: 3px;
      margin-bottom: 24px;
      overflow: hidden;
    }

    .timer-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green), var(--amber), var(--red));
      background-size: 300% 100%;
      border-radius: 99px;
      transition: width 1s linear, background-position 1s linear;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 40px 40px 32px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 0 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
      animation: cardIn 0.4s ease both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.97); }
      to   { opacity: 1; transform: scale(1); }
    }

    .q-meta {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      letter-spacing: 0.12em;
      margin-bottom: 14px;
      text-transform: uppercase;
    }

    .q-meta span { color: var(--cyan); }

    #question {
      font-size: 21px;
      font-weight: 700;
      line-height: 1.45;
      margin-bottom: 28px;
      color: white;
      min-height: 60px;
    }

    #question.code-q {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      background: rgba(56,217,245,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      color: var(--cyan);
    }

    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .opt-btn {
      position: relative;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      text-align: left;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .opt-btn .opt-key {
      width: 24px; height: 24px;
      background: rgba(56,217,245,0.08);
      border: 1px solid rgba(56,217,245,0.15);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      flex-shrink: 0;
      transition: all 0.18s;
    }

    .opt-btn:hover:not(:disabled) {
      border-color: rgba(56,217,245,0.4);
      background: rgba(56,217,245,0.06);
      transform: translateY(-1px);
    }

    .opt-btn:hover:not(:disabled) .opt-key {
      background: rgba(56,217,245,0.15);
      color: var(--cyan);
    }

    .opt-btn.correct {
      border-color: var(--green);
      background: rgba(61,245,160,0.1);
      color: var(--green);
    }

    .opt-btn.correct .opt-key {
      background: rgba(61,245,160,0.2);
      border-color: var(--green);
      color: var(--green);
    }

    .opt-btn.wrong {
      border-color: var(--red);
      background: rgba(255,85,85,0.08);
      color: var(--red);
    }

    .opt-btn.wrong .opt-key {
      background: rgba(255,85,85,0.15);
      border-color: var(--red);
      color: var(--red);
    }

    .opt-btn:disabled { cursor: default; transform: none; }

    /* Code-style options */
    .code-opt {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }

    /* Feedback flash */
    .feedback-overlay {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 99;
      display: flex; align-items: center; justify-content: center;
    }

    .feedback-msg {
      font-size: 42px;
      font-weight: 800;
      opacity: 0;
      transform: scale(0.8);
      transition: none;
      padding: 16px 32px;
      border-radius: 16px;
    }

    .feedback-msg.show {
      animation: feedAnim 0.8s ease forwards;
    }

    @keyframes feedAnim {
      0%   { opacity: 0; transform: scale(0.7); }
      20%  { opacity: 1; transform: scale(1.05); }
      60%  { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.9) translateY(-10px); }
    }

    .feedback-msg.correct-f {
      color: var(--green);
      text-shadow: 0 0 30px rgba(61,245,160,0.6);
    }

    .feedback-msg.wrong-f {
      color: var(--red);
      text-shadow: 0 0 30px rgba(255,85,85,0.6);
    }

    /* Points pop */
    .pts-pop {
      position: fixed;
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      color: var(--cyan);
      pointer-events: none;
      z-index: 100;
      animation: ptsFly 0.9s ease forwards;
    }

    @keyframes ptsFly {
      0%   { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-60px); }
    }
  </style>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
  <div class="feedback-overlay">
    <div class="feedback-msg" id="feedbackMsg"></div>
  </div>

  <div class="wrap">
    <div class="hud">
      <div class="hud-pill">
        <div class="dot"></div>
        <span>Score: <span class="score-val" id="scoreVal">0</span></span>
      </div>
      <span class="diff-badge" id="diffBadge">easy</span>
      <div class="hud-pill">
        <span>⏱ <span class="timer-val" id="timerVal">60s</span></span>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>

    <div class="timer-bar-wrap">
      <div class="timer-bar-fill" id="timerBar" style="width:100%"></div>
    </div>

    <div class="card">
      <p class="q-meta">Question <span id="qNum">1</span> / <span id="qTotal">10</span></p>
      <div id="question">Loading...</div>
      <div class="options" id="options"></div>
    </div>
  </div>

  <script>
    // ─── FIREBASE CONFIGURATION ──────────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyDHWrmimEKnTEk2-jH4AKflay-2tfatB54",
      authDomain: "quiz-bot-936ca.firebaseapp.com",
      databaseURL: "https://quiz-bot-936ca-default-rtdb.firebaseio.com",
      projectId: "quiz-bot-936ca",
      storageBucket: "quiz-bot-936ca.firebasestorage.app",
      messagingSenderId: "821265014853",
      appId: "1:821265014853:web:ba28584c54d848cca4432c",
      measurementId: "G-GGHS6286L8"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ─── QUESTION BANK ───────────────────────────────────────────────────
    const allQuestions = {
      easy: [
        { q: "What is the capital of France?", opts: ["Berlin","Madrid","Paris","Rome"], ans: "Paris" },
        { q: "Which planet is known as the Red Planet?", opts: ["Earth","Mars","Jupiter","Venus"], ans: "Mars" },
        { q: "What is 12 × 12?", opts: ["124","144","132","148"], ans: "144" },
        { q: "Who painted the Mona Lisa?", opts: ["Van Gogh","Picasso","Da Vinci","Michelangelo"], ans: "Da Vinci" },
        { q: "What is the chemical symbol for water?", opts: ["H2O","CO2","O2","NaCl"], ans: "H2O" },
        { q: "How many sides does a hexagon have?", opts: ["5","6","7","8"], ans: "6" },
        { q: "What is the largest ocean on Earth?", opts: ["Atlantic","Indian","Arctic","Pacific"], ans: "Pacific" },
        { q: "Which country gifted the Statue of Liberty to the USA?", opts: ["Germany","France","UK","Italy"], ans: "France" },
        { q: "What color do you get mixing blue and yellow?", opts: ["Purple","Orange","Green","Brown"], ans: "Green" },
        { q: "How many continents are there?", opts: ["5","6","7","8"], ans: "7" },
        { q: "What is the capital of Japan?", opts: ["Seoul","Beijing","Tokyo","Hanoi"], ans: "Tokyo" },
        { q: "Which gas do plants use for photosynthesis?", opts: ["Oxygen","Nitrogen","Carbon Dioxide","Hydrogen"], ans: "Carbon Dioxide" },
        { q: "What is the smallest prime number?", opts: ["0","1","2","3"], ans: "2" },
        { q: "Which is the longest river in the world?", opts: ["Amazon","Nile","Yangtze","Mississippi"], ans: "Nile" },
        { q: "What is the boiling point of water (°C)?", opts: ["90","95","100","110"], ans: "100" },
        { q: "Who wrote 'Romeo and Juliet'?", opts: ["Dickens","Shakespeare","Austen","Hemingway"], ans: "Shakespeare" },
        { q: "What is the largest planet in our solar system?", opts: ["Saturn","Neptune","Earth","Jupiter"], ans: "Jupiter" },
        { q: "What does 'www' stand for?", opts: ["World Wide Web","World Wide Wire","Wide Web World","Web World Wide"], ans: "World Wide Web" },
        { q: "How many minutes are in an hour?", opts: ["30","45","60","90"], ans: "60" },
        { q: "What is the national flower of India?", opts: ["Rose","Lotus","Marigold","Sunflower"], ans: "Lotus" },
      ],
      medium: [
        { q: "What is the chemical symbol for gold?", opts: ["Ag","Au","Pb","Pt"], ans: "Au" },
        { q: "Which year did World War II end?", opts: ["1940","1943","1945","1950"], ans: "1945" },
        { q: "What is the value of π to 2 decimal places?", opts: ["3.12","3.14","3.16","3.18"], ans: "3.14" },
        { q: "Who is known as the Father of Computers?", opts: ["Alan Turing","Charles Babbage","Bill Gates","Von Neumann"], ans: "Charles Babbage" },
        { q: "What is the largest mammal on Earth?", opts: ["Elephant","Blue Whale","Giraffe","Hippo"], ans: "Blue Whale" },
        { q: "What is the official language of Brazil?", opts: ["Spanish","English","Portuguese","French"], ans: "Portuguese" },
        { q: "Which element has atomic number 79?", opts: ["Silver","Platinum","Gold","Copper"], ans: "Gold" },
        { q: "What is the square root of 144?", opts: ["11","12","13","14"], ans: "12" },
        { q: "Which ocean is the smallest?", opts: ["Indian","Arctic","Atlantic","Southern"], ans: "Arctic" },
        { q: "What does DNA stand for?", opts: ["Deoxyribose Nucleic Acid","Dynamic Nucleic Acid","Deoxyribonucleic Acid","Digital Nucleic Acid"], ans: "Deoxyribonucleic Acid" },
        { q: "What is the hardest natural substance?", opts: ["Gold","Iron","Diamond","Quartz"], ans: "Diamond" },
        { q: "Which planet has the most moons?", opts: ["Jupiter","Saturn","Uranus","Neptune"], ans: "Saturn" },
        { q: "What is the main ingredient in glass?", opts: ["Salt","Sand","Carbon","Limestone"], ans: "Sand" },
        { q: "Who developed the theory of general relativity?", opts: ["Newton","Bohr","Einstein","Hawking"], ans: "Einstein" },
        { q: "What programming language was created by Guido van Rossum?", opts: ["Java","Ruby","Python","Perl"], ans: "Python", isCode: false },
        { q: "Which country has the largest population?", opts: ["USA","India","China","Russia"], ans: "India" },
        { q: "How many bones are in the adult human body?", opts: ["196","206","216","226"], ans: "206" },
        { q: "What is the freezing point of water in Fahrenheit?", opts: ["0°F","16°F","32°F","40°F"], ans: "32°F" },
        { q: "Which company created the Java programming language?", opts: ["Microsoft","Sun Microsystems","IBM","Apple"], ans: "Sun Microsystems" },
        { q: "What does HTTP stand for?", opts: ["HyperText Transfer Protocol","High Transfer Text Protocol","HyperText Transmission Protocol","Home Text Transfer Protocol"], ans: "HyperText Transfer Protocol" },
      ],
      hard: [
        { q: "What is the output of: print(type([] == []))", opts: ["<class 'list'>","<class 'bool'>","<class 'NoneType'>","Error"], ans: "<class 'bool'>", isCode: true },
        { q: "In Big-O notation, what is the time complexity of binary search?", opts: ["O(n)","O(n²)","O(log n)","O(1)"], ans: "O(log n)", isCode: true },
        { q: "What will this return?\n'hello'[::-1]", opts: ["olleh","hello","Error","None"], ans: "olleh", isCode: true },
        { q: "Which data structure uses LIFO order?", opts: ["Queue","Heap","Stack","Tree"], ans: "Stack" },
        { q: "What is the value of 0.1 + 0.2 == 0.3 in Python?", opts: ["True","False","None","Error"], ans: "False", isCode: true },
        { q: "What port does HTTPS run on by default?", opts: ["80","443","8080","22"], ans: "443", isCode: true },
        { q: "What does SQL stand for?", opts: ["Structured Query Language","Simple Query Language","Standard Query Logic","Sequential Query Language"], ans: "Structured Query Language" },
        { q: "Which sorting algorithm has the best average-case complexity?", opts: ["Bubble Sort","Merge Sort","Insertion Sort","Selection Sort"], ans: "Merge Sort" },
        { q: "What is 2^10?", opts: ["512","1024","2048","256"], ans: "1024" },
        { q: "In CSS, what does 'em' unit refer to?", opts: ["Screen width","Font size of element","Root font size","Viewport height"], ans: "Font size of element" },
        { q: "What does 'git rebase' do?", opts: ["Deletes commits","Merges branches","Replays commits on a new base","Resets the repo"], ans: "Replays commits on a new base" },
        { q: "Which HTTP method is idempotent AND safe?", opts: ["POST","PUT","DELETE","GET"], ans: "GET" },
        { q: "What is the Fibonacci sequence after 8?\n0, 1, 1, 2, 3, 5, 8, ?", opts: ["11","12","13","14"], ans: "13", isCode: true },
        { q: "In Python, what is the output of: bool([])?", opts: ["True","False","None","Error"], ans: "False", isCode: true },
        { q: "What does the 'this' keyword refer to in JavaScript?", opts: ["The file","The current object","The window always","The parent function"], ans: "The current object" },
        { q: "Which OSI layer does IP operate at?", opts: ["Layer 1","Layer 2","Layer 3","Layer 4"], ans: "Layer 3" },
        { q: "What is a race condition?", opts: ["CPU overload","Two threads accessing shared data unpredictably","Memory leak","Infinite loop"], ans: "Two threads accessing shared data unpredictably" },
        { q: "What does 'NaN === NaN' return in JavaScript?", opts: ["true","false","undefined","Error"], ans: "false", isCode: true },
        { q: "Which algorithm is used in RSA encryption?", opts: ["Symmetric key","Elliptic curves","Prime factorisation","Hashing"], ans: "Prime factorisation" },
        { q: "What is the output?\nconsole.log(typeof null)", opts: ["null","undefined","object","string"], ans: "object", isCode: true },
      ]
    };

    // ─── SETUP ───────────────────────────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const playerName = params.get('name') || localStorage.getItem('playerName') || 'Player';
    const difficulty = params.get('diff') || localStorage.getItem('difficulty') || 'easy';
    const pointsMap = { easy: 1, medium: 2, hard: 3 };
    const POINTS = pointsMap[difficulty] || 1;
    const TIMER_TOTAL = 60;

    document.getElementById('diffBadge').textContent = difficulty;
    document.getElementById('diffBadge').className = `diff-badge ${difficulty}`;

    function shuffle(arr) {
      return [...arr].sort(() => Math.random() - 0.5);
    }

    const pool = shuffle(allQuestions[difficulty]).slice(0, 10);
    const TOTAL = pool.length;
    document.getElementById('qTotal').textContent = TOTAL;

    let currentIdx = 0;
    let score = 0;
    let timeLeft = TIMER_TOTAL;
    let timerInterval = null;
    let answered = false;

    // ─── DISPLAY QUESTION ────────────────────────────────────────────────
    function displayQuestion() {
      if (currentIdx >= TOTAL) { endGame(); return; }

      answered = false;
      const q = pool[currentIdx];
      document.getElementById('qNum').textContent = currentIdx + 1;

      document.getElementById('progressFill').style.width = `${(currentIdx / TOTAL) * 100}%`;

      const qEl = document.getElementById('question');
      qEl.textContent = q.q;
      qEl.className = q.isCode ? 'code-q' : '';

      const shuffledOpts = shuffle(q.opts);
      const keys = ['A','B','C','D'];
      const container = document.getElementById('options');
      container.innerHTML = '';

      shuffledOpts.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn' + (q.isCode ? ' code-opt' : '');
        btn.innerHTML = `<span class="opt-key">${keys[i]}</span>${escHtml(opt)}`;
        btn.onclick = () => checkAnswer(btn, opt, q.ans);
        container.appendChild(btn);
      });

      const card = document.querySelector('.card');
      card.style.animation = 'none';
      requestAnimationFrame(() => { card.style.animation = 'cardIn 0.3s ease both'; });
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ─── CHECK ANSWER ────────────────────────────────────────────────────
    function checkAnswer(btn, selected, correct) {
      if (answered) return;
      answered = true;

      const allBtns = document.querySelectorAll('.opt-btn');
      allBtns.forEach(b => b.disabled = true);

      if (selected === correct) {
        btn.classList.add('correct');
        score += POINTS;
        document.getElementById('scoreVal').textContent = score;
        showFeedback('correct');
        showPtsPop(`+${POINTS}`);
      } else {
        btn.classList.add('wrong');
        allBtns.forEach(b => {
          if (b.textContent.includes(correct)) b.classList.add('correct');
        });
        showFeedback('wrong');
      }

      setTimeout(() => {
        currentIdx++;
        displayQuestion();
      }, 900);
    }

    // ─── FEEDBACK ────────────────────────────────────────────────────────
    function showFeedback(type) {
      const el = document.getElementById('feedbackMsg');
      el.className = 'feedback-msg';
      el.textContent = type === 'correct' ? '✓ Correct!' : '✗ Wrong!';
      void el.offsetWidth;
      el.className = `feedback-msg ${type === 'correct' ? 'correct-f' : 'wrong-f'} show`;
    }

    function showPtsPop(text) {
      const el = document.createElement('div');
      el.className = 'pts-pop';
      el.textContent = text;
      el.style.left = '50%';
      el.style.top = '40%';
      el.style.transform = 'translateX(-50%)';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 900);
    }

    // ─── TIMER ───────────────────────────────────────────────────────────
    function startTimer() {
      const timerVal = document.getElementById('timerVal');
      const timerBar = document.getElementById('timerBar');

      timerInterval = setInterval(() => {
        timeLeft--;
        timerVal.textContent = `${timeLeft}s`;
        timerVal.className = timeLeft <= 10 ? 'timer-val urgent' : 'timer-val';
        timerBar.style.width = `${(timeLeft / TIMER_TOTAL) * 100}%`;

        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          endGame();
        }
      }, 1000);
    }

    // ─── END GAME (PUSH RESULTS TO REALTIME DATABASE) ────────────────────
    function endGame() {
      clearInterval(timerInterval);

      // Secure payload structured to pass validation filter rules cleanly
      db.ref("scores").push({
        name: playerName,
        score: score,
        difficulty: difficulty,
        date: new Date().toLocaleDateString()
      })
      .then(() => {
        localStorage.setItem('playerName', playerName);
        localStorage.setItem('playerScore', score);
        window.location.href = `leaderboard.html?name=${encodeURIComponent(playerName)}&score=${score}&diff=${difficulty}`;
      })
      .catch((error) => {
        console.error("Firebase runtime upload dropped: ", error);
        localStorage.setItem('playerName', playerName);
        localStorage.setItem('playerScore', score);
        window.location.href = `leaderboard.html?name=${encodeURIComponent(playerName)}&score=${score}&diff=${difficulty}`;
      });
    }

    // ─── INIT ─────────────────────────────────────────────────────────────
    displayQuestion();
    startTimer();
  </script>
</body>
</html>
