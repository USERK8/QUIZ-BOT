<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUS QUIZ BOT - userk8__</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --void: #04060f;
      --deep: #080d1a;
      --surface: rgba(12, 20, 40, 0.85);
      --border: rgba(100, 180, 255, 0.12);
      --cyan: #38d9f5;
      --amber: #f5a623;
      --red: #f55;
      --text: #ccd9f0;
      --muted: #5a7099;
      --glow-cyan: 0 0 20px rgba(56,217,245,0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--void);
      font-family: 'Syne', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Star field */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 15%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 45%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 75%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 85%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 90%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 90% 10%, rgba(56,217,245,0.6) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 5% 50%, rgba(56,217,245,0.4) 0%, transparent 100%),
        radial-gradient(2px 2px at 60% 80%, rgba(245,166,35,0.4) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Nebula glow */
    body::after {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(ellipse, rgba(56,217,245,0.06) 0%, transparent 70%);
      top: -100px; right: -100px;
      pointer-events: none;
      z-index: 0;
    }

    .nebula2 {
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(ellipse, rgba(120,60,255,0.07) 0%, transparent 70%);
      bottom: -100px; left: -50px;
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 52px 48px;
      width: 440px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 0 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06);
      animation: rise 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--cyan), #6060ff);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: var(--glow-cyan);
    }

    .logo-text {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.25em;
      color: var(--cyan);
      text-transform: uppercase;
    }

    h1 {
      font-size: 36px;
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fff 30%, var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 36px;
      font-family: 'JetBrains Mono', monospace;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    input[type="text"] {
      width: 100%;
      background: rgba(56,217,245,0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      color: white;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 24px;
    }

    input[type="text"]:focus {
      border-color: var(--cyan);
      box-shadow: var(--glow-cyan);
    }

    input[type="text"]::placeholder { color: var(--muted); }

    .btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--cyan), #4a9eff);
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #04060f;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: var(--glow-cyan);
    }

    .btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 0 30px rgba(56,217,245,0.5); }
    .btn:active { transform: translateY(0); }

    .error {
      color: var(--red);
      font-size: 12px;
      margin-top: -16px;
      margin-bottom: 16px;
      display: none;
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>
<body>
  <div class="nebula2"></div>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🧀</div>
      <span class="logo-text">Sus Quiz Bot</span>
    </div>
    <h1>Ready to test your brain?</h1>
    <p class="subtitle">// no cap, just answer some goofy questions</p>
    <label for="username">Your Name</label>
    <input type="text" id="username" placeholder="type ur freaky name here" autocomplete="off" maxlength="24">
    <p class="error" id="error">⚠ Enter your name first.</p>
    <button class="btn" onclick="proceed()">Launch Quiz →</button>
  </div>

  <script>
    function proceed() {
      const name = document.getElementById('username').value.trim();
      const err = document.getElementById('error');
      if (!name) { err.style.display = 'block'; return; }
      err.style.display = 'none';
      window.location.href = `quiz.html?name=${encodeURIComponent(name)}`;
    }
    document.getElementById('username').addEventListener('keydown', e => {
      if (e.key === 'Enter') proceed();
    });
  </script>
</body>
</html>
